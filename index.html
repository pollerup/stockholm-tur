<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockholm Tur 🇸🇪</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #0f1923; color: #e8ddd0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

header {
  padding: 10px 16px;
  background: #0f1923;
  border-bottom: 1px solid #1e2d3a;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; gap: 10px; flex-wrap: wrap;
}
.title-block h1 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: #e8ddd0; }
.title-block p { font-size: 0.7rem; color: #7a9bb5; margin-top: 1px; }

.filters { display: flex; gap: 5px; flex-wrap: wrap; }
.filter-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  border: 1.5px solid transparent;
  background: #1a2a38; cursor: pointer;
  font-size: 0.7rem; font-family: 'DM Sans', sans-serif;
  font-weight: 500; color: #9bb5c8;
  transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { background: #243545; }
.filter-btn.active { background: #1e3248; border-color: var(--c); color: #e8ddd0; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.count { background: #0f1923; border-radius: 8px; padding: 1px 5px; font-size: 0.65rem; color: #7a9bb5; }

.main { flex: 1; display: flex; overflow: hidden; }

/* List panel */
#list-panel {
  width: 280px; flex-shrink: 0;
  background: #111d28;
  border-right: 1px solid #1e2d3a;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
#list-panel::-webkit-scrollbar { width: 4px; }
#list-panel::-webkit-scrollbar-track { background: #111d28; }
#list-panel::-webkit-scrollbar-thumb { background: #243545; border-radius: 2px; }

.list-item {
  padding: 10px 14px;
  border-bottom: 1px solid #1a2a38;
  cursor: pointer;
  transition: background 0.1s;
  display: flex; align-items: flex-start; gap: 10px;
}
.list-item:hover { background: #1a2a38; }
.list-item.active { background: #1e3248; }
.list-item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.list-item-body {}
.list-item-name { font-size: 0.8rem; font-weight: 600; color: #e8ddd0; line-height: 1.3; }
.list-item-cat { font-size: 0.65rem; color: #7a9bb5; margin-top: 1px; }

/* Map area */
#map-area { flex: 1; position: relative; }
#map-frame { width: 100%; height: 100%; border: none; }

/* Info panel */
#info-panel {
  position: absolute; bottom: 16px; right: 16px;
  width: 260px;
  background: #1a2a38;
  border: 1px solid #243545;
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  display: none;
}
#info-panel.visible { display: block; }
.info-cat { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
.info-name { font-family: 'DM Serif Display', serif; font-size: 1rem; color: #e8ddd0; line-height: 1.25; }
.info-note { font-size: 0.73rem; color: #9bb5c8; margin-top: 5px; line-height: 1.4; }
.info-hours { font-size: 0.68rem; margin-top: 7px; padding: 4px 7px; background: #0f1923; border-radius: 6px; color: #7a9bb5; }
.info-link { display: inline-block; margin-top: 8px; font-size: 0.7rem; color: #4d9ecb; text-decoration: none; }
.info-link:hover { text-decoration: underline; }
.info-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #7a9bb5; cursor: pointer; font-size: 1rem; line-height: 1; }
.info-close:hover { color: #e8ddd0; }

.empty-msg { padding: 20px 14px; color: #7a9bb5; font-size: 0.78rem; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>Stockholm 🇸🇪</h1>
    <p>Fredag → Søndag · Scandic Klara</p>
  </div>
  <div class="filters" id="filters"></div>
</header>

<div class="main">
  <div id="list-panel"></div>
  <div id="map-area">
    <iframe id="map-frame"
      loading="lazy"
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade"
      src="about:blank">
    </iframe>
    <div id="info-panel">
      <button class="info-close" onclick="closeInfo()">✕</button>
      <div class="info-cat" id="icat"></div>
      <div class="info-name" id="iname"></div>
      <div class="info-note" id="inote"></div>
      <div class="info-hours" id="ihours"></div>
      <a class="info-link" id="ilink" href="#" target="_blank">Åbn i Google Maps →</a>
    </div>
  </div>
</div>

<script>

  {cat:'morgenmad',name:'Gast Café',note:'Hyggelig café – lukket lørdag men åben søndag',lat:59.33967,lng:18.05676,hours:'Søn 9-17',maps:'https://maps.google.com/?q=59.33967,18.05676'},

  {cat:'morgenmad',name:'Two Fat Ladies',note:'Hyggelig weekend-brunch i Östermalm',lat:59.34729,lng:18.06726,hours:'Lør-Søn 9-15:30',maps:'https://maps.google.com/?q=59.34729,18.06726'},

  {cat:'burgere',name:"Burgers'n'Fuel",note:'Rensdyrburger og klassiske smash burgers i Gamla Stan',lat:59.32427,lng:18.07035,hours:'Lør-Søn 11-22',maps:'https://maps.google.com/?q=59.32427,18.07035'},

  {cat:'burgere',name:'Bastard Burgers',note:'Svensk burgerkæde med god veganoption',lat:59.33479,lng:18.06380,hours:'Lør-Søn 11-23',maps:'https://maps.google.com/?q=59.33479,18.06380'},
  // KØDBOLLER
  {cat:'koedboll',name:'Stockholms Gästabud',note:'En af byens bedste köttbullar – ingen reservation, ventetid mulig',lat:59.32568,lng:18.07399,hours:'Lør-Søn 12-22',maps:'https://maps.google.com/?q=59.32568,18.07399'},
  {cat:'koedboll',name:'Restaurant Tradition',note:'Klassisk og hyggelig i Gamla Stan – åben i weekenden',lat:59.32595,lng:18.07385,hours:'Lør-Søn 12-23',maps:'https://maps.google.com/?q=59.32595,18.07385'},
  {cat:'koedboll',name:'Meatballs for the People',note:'Prøv rensdyr, elg og bjørn! Åben alle dage',lat:59.31460,lng:18.08126,hours:'Lør 11-24 · Søn 11-22:30',maps:'https://maps.google.com/?q=59.31460,18.08126'},
  {cat:'koedboll',name:'Nomad Swedish Food & Bar',note:'Moderne svensk mad – prøv wild stew og toast skagen',lat:59.33611,lng:18.05529,hours:'Lør-Søn 17-23',maps:'https://maps.google.com/?q=59.33611,18.05529'},
  {cat:'koedboll',name:'FIKA & WINE',note:'Hyggelig restaurant i Gamla Stan – gode kødboller',lat:59.32388,lng:18.07363,hours:'Lør 11-23 · Søn 11-22:30',maps:'https://maps.google.com/?q=59.32388,18.07363'},
  {cat:'koedboll',name:'House of Smorgasbord',note:'Familieejet i Gamla Stan – smag alt med mindre tallerkener',lat:59.32572,lng:18.07397,hours:'Lør 12-23 · Søn 12-21',maps:'https://maps.google.com/?q=59.32572,18.07397'},
  {cat:'koedboll',name:'Bakfickan',note:'Klassisk svensk – book bord, populær i weekenden',lat:59.33016,lng:18.07080,hours:'Lør 12-22',maps:'https://maps.google.com/?q=59.33016,18.07080'},
  // ØL & MAD
  {cat:'oel',name:'Aifur (Viking Bar)',note:'Viking-tema, mjød, levende musik – BOOK MINDST 1 UGE I FORVEJEN!',lat:59.32312,lng:18.07183,hours:'Lør 16-01',maps:'https://maps.google.com/?q=59.32312,18.07183'},
  {cat:'oel',name:'Den Gyldene Freden',note:'Stockholms ældste restaurant (1722) – historisk og imponerende',lat:59.32317,lng:18.07379,hours:'Lør 12-24',maps:'https://maps.google.com/?q=59.32317,18.07379'},
  {cat:'oel',name:'Barrels (øl)',note:'Lokal bryggeri-tap på væggen – godt øludvalg',lat:59.32464,lng:18.06848,hours:'Lør 11:30-24 · Søn 12-22',maps:'https://maps.google.com/?q=59.32464,18.06848'},
  {cat:'oel',name:'Bryggeri Munkbron',note:'Mikrobryggeri i Gamla Stan – husbrygget øl og pølseplade',lat:59.32447,lng:18.06748,hours:'Lør 16-01',maps:'https://maps.google.com/?q=59.32447,18.06748'},
  {cat:'oel',name:'Bishop Arms Gamla Stan',note:'Klassisk pub med stort øludvalg i Gamla Stan',lat:59.32314,lng:18.06900,hours:'Lør 16-24 · Søn 16-22',maps:'https://maps.google.com/?q=59.32314,18.06900'},
  {cat:'oel',name:'Oliver Twist',note:'Engelsk pub i Södermalm – håndpumper og hyggelig stemning',lat:59.31833,lng:18.06987,hours:'Lør 12-01',maps:'https://maps.google.com/?q=59.31833,18.06987'},
  {cat:'oel',name:'The Flying Dog',note:'Lokal bar tæt på hotellet – god stemning',lat:59.33475,lng:18.05601,hours:'Lør 13-03',maps:'https://maps.google.com/?q=59.33475,18.05601'},
  {cat:'oel',name:'Tritonia Ölverkstad',note:'Craft beer ved Barrels – enormt udvalg af lokale øl',lat:59.32460,lng:18.06851,hours:'Lør 11:30-24 · Søn 11:30-22',maps:'https://maps.google.com/?q=59.32460,18.06851'},
  // SEVÆRDIGHEDER
  {cat:'sights',name:'🏨 Scandic Klara (Hotellet)',note:'Jeres base for weekenden',lat:59.33284,lng:18.05720,hours:'',maps:'https://maps.google.com/?q=59.33284,18.05720'},
  {cat:'sights',name:'Det Kongelige Slot',note:'Verdens største beboede slot – 600 rum, vagtskifte kl. 12',lat:59.32682,lng:18.07172,hours:'Åben alle dage 10-17',maps:'https://maps.google.com/?q=59.32682,18.07172'},
  {cat:'sights',name:'Vasa Museet',note:'Et af Europas bedste museer – 1600-tals krigsskib næsten intakt',lat:59.32802,lng:18.09140,hours:'Åben alle dage 8:30-18',maps:'https://maps.google.com/?q=59.32802,18.09140'},
  {cat:'sights',name:'Skansen',note:'Verdens første friluftsmuseum – svenske dyr og historiske bygninger',lat:59.32632,lng:18.10586,hours:'Åben alle dage 10-18',maps:'https://maps.google.com/?q=59.32632,18.10586'},
  {cat:'sights',name:'ABBA Museet',note:'Interaktivt og underholdende – dans med hologrammer af ABBA!',lat:59.32509,lng:18.09678,hours:'Åben alle dage 9-20',maps:'https://maps.google.com/?q=59.32509,18.09678'},
  {cat:'sights',name:'Fotografiska',note:'Verdensklasse fotomuseum – åbent til 23 hver dag',lat:59.31796,lng:18.08483,hours:'Åben alle dage 10-23',maps:'https://maps.google.com/?q=59.31796,18.08483'},
  {cat:'sights',name:'Storkyrkan',note:'Stockholms ældste kirke (1306) – Sankt Jørgen og Dragen',lat:59.32583,lng:18.07035,hours:'Åben alle dage 9:30-17',maps:'https://maps.google.com/?q=59.32583,18.07035'},
  {cat:'sights',name:'Stockholms Rådhus',note:'Nobelbanket-lokalet – den gyldne sal er spektakulær',lat:59.32779,lng:18.05518,hours:'Åben alle dage (kun guidede ture)',maps:'https://maps.google.com/?q=59.32779,18.05518'},
  {cat:'sights',name:'Kungsträdgården',note:'Kongens have – fontæner og byens samlingspunkt',lat:59.33109,lng:18.07183,hours:'Åben 24/7 – gratis',maps:'https://maps.google.com/?q=59.33109,18.07183'},
  {cat:'sights',name:'Gamla Stan',note:'Middelalderlig gammel bydel – smalle gyder og farvede huse',lat:59.32570,lng:18.07050,hours:'Altid åben – gå og nyd',maps:'https://maps.google.com/?q=59.32570,18.07050'},
  {cat:'sights',name:'Moderna Museet',note:'Moderne kunst på Djurgården – gratis fredage 18-20',lat:59.32605,lng:18.08469,hours:'Tir-Søn 10-18',maps:'https://maps.google.com/?q=59.32605,18.08469'},
];

var catMap = {};
CATS.forEach(function(c){ catMap[c.id]=c; });

var activeFilters = {};
CATS.forEach(function(c){ activeFilters[c.id]=true; });

var selectedPlace = null;

// --- Build filter buttons ---
var filtersEl = document.getElementById('filters');

var allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.style.setProperty('--c','#e8ddd0');
allBtn.innerHTML = '<span class="dot" style="background:#e8ddd0"></span>Alle <span class="count">'+PLACES.length+'</span>';
allBtn.dataset.cat = 'all';
filtersEl.appendChild(allBtn);

CATS.forEach(function(cat){
  var count = PLACES.filter(function(p){ return p.cat===cat.id; }).length;
  var btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.style.setProperty('--c', cat.color);
  btn.dataset.cat = cat.id;
  btn.innerHTML = '<span class="dot" style="background:'+cat.color+'"></span>'+cat.label+' <span class="count">'+count+'</span>';
  filtersEl.appendChild(btn);
});

filtersEl.addEventListener('click', function(e){
  var btn = e.target.closest('.filter-btn');
  if(!btn) return;
  var cat = btn.dataset.cat;
  if(cat==='all'){
    var anyOn = Object.values(activeFilters).some(function(v){ return v; });
    CATS.forEach(function(c){ activeFilters[c.id]=!anyOn; });
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.toggle('active',!anyOn); });
  } else {
    activeFilters[cat] = !activeFilters[cat];
    btn.classList.toggle('active', activeFilters[cat]);
    var allOn = CATS.every(function(c){ return activeFilters[c.id]; });
    allBtn.classList.toggle('active', allOn);
  }
  renderList();
});

// --- List ---
var listEl = document.getElementById('list-panel');

function renderList(){
  listEl.innerHTML = '';
  var visible = PLACES.filter(function(p){ return activeFilters[p.cat]; });
  if(visible.length===0){
    var msg = document.createElement('div');
    msg.className = 'empty-msg';
    msg.textContent = 'Ingen steder valgt – klik på en kategori ovenfor';
    listEl.appendChild(msg);
    return;
  }
  // group by category
  CATS.forEach(function(cat){
    var items = visible.filter(function(p){ return p.cat===cat.id; });
    if(items.length===0) return;
    var header = document.createElement('div');
    header.style.cssText='padding:8px 14px 4px;font-size:0.62rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:'+cat.color+';background:#0f1923;position:sticky;top:0;z-index:1;';
    header.textContent = cat.label;
    listEl.appendChild(header);
    items.forEach(function(place){
      var item = document.createElement('div');
      item.className = 'list-item' + (selectedPlace===place?' active':'');
      item.innerHTML = '<div class="list-item-dot" style="background:'+cat.color+'"></div><div class="list-item-body"><div class="list-item-name">'+place.name+'</div><div class="list-item-cat">'+place.hours+'</div></div>';
      item.addEventListener('click', function(){ selectPlace(place, item); });
      listEl.appendChild(item);
    });
  });
}

function selectPlace(place, itemEl){
  selectedPlace = place;
  document.querySelectorAll('.list-item').forEach(function(el){ el.classList.remove('active'); });
  if(itemEl) itemEl.classList.add('active');

  // Update map
  var frame = document.getElementById('map-frame');
  frame.src = 'https://maps.google.com/maps?q='+place.lat+','+place.lng+'&z=17&output=embed';

  // Update info panel
  var cat = catMap[place.cat];
  document.getElementById('icat').textContent = cat.label.toUpperCase();
  document.getElementById('icat').style.color = cat.color;
  document.getElementById('iname').textContent = place.name;
  document.getElementById('inote').textContent = place.note || '';
  var hoursEl = document.getElementById('ihours');
  if(place.hours){ hoursEl.textContent = '⏰ '+place.hours; hoursEl.style.display='block'; }
  else { hoursEl.style.display='none'; }
  var link = document.getElementById('ilink');
  if(place.maps){ link.href=place.maps; link.style.display='inline-block'; }
  else { link.style.display='none'; }

  document.getElementById('info-panel').classList.add('visible');
}

function closeInfo(){
  document.getElementById('info-panel').classList.remove('visible');
  selectedPlace = null;
  document.querySelectorAll('.list-item').forEach(function(el){ el.classList.remove('active'); });
}

// init: show overview map
(function(){
  var frame = document.getElementById('map-frame');
  frame.src = 'https://maps.google.com/maps?q=59.329,18.065&z=14&output=embed';
  renderList();
})();
</script>
</body>
</html>
